<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>TikSave — Download TikTok Tanpa Watermark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<div class="container">
  <nav>
    <div class="logo">TikSave</div>
    <span class="nav-tag">No Watermark</span>
  </nav>

  <div class="hero">
    <h1>Download TikTok<br><em>Tanpa Watermark</em></h1>
    <p class="hero-sub">Tempel link, klik unduh. Gratis selamanya.</p>

    <div class="input-card">
      <div class="input-row">
        <input
          type="text"
          id="urlInput"
          class="url-input"
          placeholder="https://www.tiktok.com/@username/video/..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn-paste" id="pasteBtn" onclick="pasteURL()">Tempel</button>
        <button class="btn-main" id="downloadBtn" onclick="fetchVideo()">
          <span id="btnText">Unduh</span>
        </button>
      </div>
    </div>

    <div class="loader" id="loader">
      <div class="loader-track"><div class="loader-fill"></div></div>
    </div>

    <div class="error-box" id="errorBox">
      <span id="errorText"></span>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-inner">
        <div class="result-media">
          <div class="thumb-wrap">
            <img id="resCover" src="" alt="Cover"/>
            <span class="thumb-badge" id="resDuration"></span>
          </div>
          <div class="result-info">
            <div class="result-author">
              <img id="resAvatar" class="author-avatar" src="" alt="Avatar"/>
              <div>
                <div class="author-name" id="resAuthor"></div>
                <div class="author-handle" id="resHandle"></div>
              </div>
            </div>
            <div class="result-title" id="resTitle"></div>
            <div class="result-stats">
              <div class="stat"><span id="resPlays"></span></div>
              <div class="stat"><span id="resLikes"></span></div>
              <div class="stat"><span id="resComments"></span></div>
            </div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="download-actions" id="downloadActions">
        <button class="btn-dl btn-dl-primary" id="dlVideoBtn" onclick="downloadFile(this)">
          Video HD
        </button>
        <button class="btn-dl btn-dl-secondary" id="dlMusicBtn" onclick="downloadFile(this)" style="display:none">
          Audio
        </button>
      </div>

      <div class="images-section" id="imagesSection" style="display:none">
        <div class="images-title">
          <span>Foto dalam postingan</span>
          <button class="btn-dl-all" onclick="downloadAllImages()">Unduh Semua</button>
        </div>
        <div class="images-grid" id="imagesGrid"></div>
      </div>
    </div>
  </div>

  <div class="features">
    <div class="feature">
      <div class="feature-label">Kualitas</div>
      <div class="feature-val">HD</div>
    </div>
    <div class="feature">
      <div class="feature-label">Watermark</div>
      <div class="feature-val">Tidak Ada</div>
    </div>
    <div class="feature">
      <div class="feature-label">Biaya</div>
      <div class="feature-val">Gratis</div>
    </div>
  </div>

  <footer>
    TikSave — Downloader TikTok Gratis &nbsp;·&nbsp;
    Dibuat oleh <a href="https://faridsyam.web.app" target="_blank" rel="noopener">MFaridS</a>
  </footer>
</div>

<script src="app.js"></script>
</body>
</html>
